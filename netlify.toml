# Netlify → Vite app in /frontend
# Set VITE_API_BASE_URL in Site settings → Environment variables to your Render URL, e.g.
#   https://your-api.onrender.com   (no trailing slash)
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: all routes serve index.html (adjust if you only use "/")
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
